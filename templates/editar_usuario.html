<!DOCTYPE html>
<html>
<head>
    <title>Editar Usuário</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div id="flash-container">
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="container">
        <h1>✏️ Editar Usuário</h1>
        
        <nav>
            <a href="{{ url_for('index') }}">📦 Materiais</a>
            <a href="{{ url_for('listar_usuarios') }}">👥 Usuários</a>
            <a href="{{ url_for('admin_dashboard') }}">📊 Dashboard</a>
            <a href="{{ url_for('logout') }}">🚪 Sair</a>
        </nav>

        <form method="post" style="max-width: 500px; margin: 20px auto;">
            <input type="text" name="nome" value="{{ usuario.nome }}" required autocomplete="off">
            <input type="email" value="{{ usuario.email }}" disabled style="background: #f5f5f5;" autocomplete="off">
            <input type="password" name="senha" placeholder="Nova senha (deixe em branco para manter)" autocomplete="off">
            
            <label for="role">Função:</label>
            <select name="role" required>
                <option value="professor" {% if usuario.role == 'professor' %}selected{% endif %}>Professor</option>
                <option value="admin" {% if usuario.role == 'admin' %}selected{% endif %}>Administrador</option>
            </select>
            
            <input type="submit" value="💾 Salvar Alterações">
        </form>

        <a class="btn" href="{{ url_for('listar_usuarios') }}">⬅️ Voltar</a>
    </div>
</body>
</html>
