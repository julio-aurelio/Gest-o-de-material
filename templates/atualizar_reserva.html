<!DOCTYPE html>
<html>

<head>
    <title>Atualizar Reserva</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
</head>

<body>
    <div class="container">
        <h1>✏️ Atualizar Reserva</h1>
        
        <div style="background: #e0f2f1; padding: 20px; border-radius: 15px; margin-bottom: 20px;">
            <h3>{{ reserva.materiais.nome }}</h3>
            <p><strong>Aluno:</strong> {{ reserva.aluno }} ({{ reserva.turma }})</p>
            <p><strong>Quantidade:</strong> {{ reserva.quantidade_reservada }} unidade(s)</p>
            <p><strong>Turno:</strong> {{ reserva.turno }}</p>
            <p><strong>Horário atual:</strong> {{ reserva.horario }}</p>
            <p><strong>Data atual:</strong> {{ reserva.data_retirada }}</p>
        </div>

        <form method="post">
            <label for="data_retirada">Nova Data de Retirada:</label>
            <input type="date" name="data_retirada" id="data_retirada" value="{{ reserva.data_retirada }}" min="{{ hoje }}" required>
            
            <label for="horario">Novo Horário:</label>
            <select name="horario" required>
                {% for i in range(horarios|length) %}
                <option value="{{ i }}" {% if reserva.horario == horarios[i] %}selected{% endif %}>
                    {{ horarios[i] }}
                </option>
                {% endfor %}
            </select>
            
            <input type="submit" value="💾 Salvar Alterações">
        </form>

        <a class="btn" href="{{ url_for('reservas') }}">❌ Cancelar</a>
    </div>
    
    <script>
        const hoje = new Date().toISOString().split('T')[0];
        document.getElementById('data_retirada').min = hoje;
    </script>
</body>

</html>
